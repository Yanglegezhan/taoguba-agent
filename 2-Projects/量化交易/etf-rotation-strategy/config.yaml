project:
  timezone: Asia/Shanghai
  output_dir: outputs
  universe_source: plan_md
  plan_md_path: etf-rotation-strategy-plan.md

data:
  provider: akshare
  cache_dir: data_cache
  start_date: "2018-01-01"
  end_date: null
  benchmark_code: "sh000001"
  disable_proxy: true
  max_retries: 5
  retry_backoff_seconds: 1.5

backtest:
  initial_cash: 1000000
  rebalance_weekday: 4
  top_n: 5
  min_hold_weeks: 1
  commission_rate: 0.0005
  min_commission: 5
  slippage_rate: 0.001
  stoploss_drawdown: 0.10
  stoploss_cooldown_weeks: 4

filters:
  min_avg_daily_amount: 50000000
  liquidity_window_days: 20

correlation:
  enabled: true
  lookback_days: 60
  threshold: 0.9

universe:
  - {code: "510300", name: "沪深300ETF", theme: "A股宽基"}
